<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment 5 - Mystic Village | Jacky Wu</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 12px;
            left: 12px;
            color: #eee;
            font-family: 'Segoe UI', system-ui, sans-serif;
            font-size: 13px;
            background: rgba(0, 0, 0, 0.55);
            padding: 12px 16px;
            border-radius: 8px;
            backdrop-filter: blur(6px);
            line-height: 1.6;
            max-width: 320px;
            pointer-events: none;
            z-index: 10;
        }
        #info h1 { font-size: 18px; margin-bottom: 4px; color: #ffd580; }
        #info .controls { color: #aaa; font-size: 12px; }
        #info .wow { color: #88ccff; margin-top: 6px; font-size: 12px; }
        #loading {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
            color: #ffd580;
            font-family: 'Segoe UI', system-ui, sans-serif;
            font-size: 20px;
            z-index: 100;
            transition: opacity 0.6s;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="loading">Loading Mystic Village...</div>
    <div id="info">
        <h1>Mystic Village</h1>
        <div class="controls">
            Left-click + drag: Orbit<br>
            Scroll: Zoom<br>
            Right-click + drag: Pan
        </div>
        <div class="wow">
            <b>Wow Features:</b> Animated windmill, particle fireflies,
            volumetric fog, water shimmer, flickering lamp, shadow mapping
        </div>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
